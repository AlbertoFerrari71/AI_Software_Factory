name: Bug
description: Segnala un comportamento errato o una regressione.
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Sintesi
      description: Descrivi il problema in modo breve e verificabile.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportamento atteso
      description: Cosa dovrebbe accadere?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Comportamento attuale
      description: Cosa accade invece?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Passi per riprodurre
      description: Elenca comandi, input o passaggi minimi.
      value: |
        010.
        020.
        030.
  - type: dropdown
    id: risk
    attributes:
      label: Livello massimo di rischio
      options:
        - L0 - Read only
        - L1 - Write safe
        - L2 - Write controlled
        - L3 - Risky
        - L4 - Destructive
      default: 0
    validations:
      required: true
  - type: textarea
    id: tests
    attributes:
      label: Test di correzione richiesti
      value: |
        - [ ] `python -m pytest -q`
